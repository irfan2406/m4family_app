name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.8'

      - name: Flutter version
        run: flutter --version

      - name: Ensure .env exists
        run: |
          if [ ! -f .env ]; then
            printf 'API_URL=http://10.0.2.2:5009\nWEB_URL=http://localhost:3000\n' > .env
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Publish APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Debug APK (latest build)
          prerelease: true
          files: build/app/outputs/flutter-apk/app-debug.apk
